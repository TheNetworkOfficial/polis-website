<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CTA Invitation</title>
  </head>
  <body>
    <main class="cta-invite">
      <section class="cta-card">
        <div class="cta-card__eyebrow">Coalition Call to Action</div>
        <h1 id="cta-title">Loading invitation…</h1>
        <p id="cta-subtitle" class="cta-card__subtitle">
          Fetching invitation details.
        </p>
        <img id="cta-image" class="cta-card__image" alt="" hidden />
        <dl class="cta-details">
          <div>
            <dt>When</dt>
            <dd id="cta-time">TBD</dd>
          </div>
          <div>
            <dt>Where</dt>
            <dd id="cta-address">TBD</dd>
          </div>
          <div>
            <dt>Transportation</dt>
            <dd id="cta-transport">Not provided</dd>
          </div>
        </dl>
        <p id="cta-description" class="cta-card__description"></p>
        <div class="cta-actions">
          <a id="cta-open-app" class="cta-button cta-button--primary" href="#">
            Open in app
          </a>
          <a
            id="cta-ios-store"
            class="cta-button"
            href="#"
            rel="noopener noreferrer"
            target="_blank"
          >
            Download on iPhone
          </a>
          <a
            id="cta-android-store"
            class="cta-button"
            href="#"
            rel="noopener noreferrer"
            target="_blank"
          >
            Download on Android
          </a>
        </div>
        <p class="cta-card__footnote">
          If you already have the app, opening the invitation there will keep
          this CTA private to invited coalition members.
        </p>
      </section>
    </main>
  </body>
</html>
